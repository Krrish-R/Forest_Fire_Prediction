<!DOCTYPE html>
<html>
<head>
    <title>FWI Prediction</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
            width:400px;
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:10px;
            background-color:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background-color:#0056b3;
        }

        h2{
            text-align:center;
            color:green;
        }
    </style>

</head>

<body>

<div class="login">

    <h1>FWI Prediction</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <input type="text" name="Temperature" placeholder="Temperature" required />

        <input type="text" name="RH" placeholder="RH" required />

        <input type="text" name="Ws" placeholder="Ws" required />

        <input type="text" name="Rain" placeholder="Rain" required />

        <input type="text" name="FFMC" placeholder="FFMC" required />

        <input type="text" name="DMC" placeholder="DMC" required />

        <input type="text" name="ISI" placeholder="ISI" required />

        <input type="text" name="Classes" placeholder="Classes" required />

        <input type="text" name="Region" placeholder="Region" required />

        <button type="submit">
            Predict
        </button>

    </form>

    <h2>
        {{ results }}
    </h2>

</div>

</body>
</html>
